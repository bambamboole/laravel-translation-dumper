name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        laravel: ["11", "12", "13"]
        exclude:
          # Laravel 13 requires PHP 8.3+
          - php: "8.2"
            laravel: "13"
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Pin Laravel ${{ matrix.laravel }}
        run: composer require "illuminate/contracts:^${{ matrix.laravel }}.0" --no-update --no-interaction

      # The Laravel 11 branch is in security-only support and every released
      # 11.x is currently flagged by a composer advisory with no patched 11.x
      # to resolve to, which blocks dependency resolution. Allow it for the
      # L11 jobs only so we can still test against it; 12/13 keep the guard.
      - name: Allow advisory-flagged Laravel 11
        if: matrix.laravel == '11'
        run: composer config --no-plugins policy.advisories.block false

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: composer test

  quality:
    name: Pint & PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Pint (style check)
        run: composer test:lint

      - name: PHPStan
        run: composer analyse
